# Music Library API Database Configuration
# 
# This properties file uses traditional Java 7 configuration patterns.
# Migration opportunities:
# - Properties files -> YAML/application.properties with Spring Boot
# - Manual connection management -> Spring Data JPA
# - H2 embedded mode -> Modern H2 configuration with connection pooling

# H2 Database Configuration - In-memory for demo purposes
# Using embedded mode typical of legacy Java applications
db.driver=org.h2.Driver
db.url=jdbc:h2:mem:musiclibrary;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
db.username=sa
db.password=

# Connection Pool Settings - Basic manual configuration
# Modern equivalent would use HikariCP or similar
db.pool.initialSize=5
db.pool.maxActive=20
db.pool.maxIdle=10
db.pool.minIdle=2

# Database Schema Settings
db.schema.create=true
db.schema.drop=false

# Application Settings
app.name=Music Library API
app.version=1.0.0
app.description=Legacy Java 7 Music Library API for migration demonstration
